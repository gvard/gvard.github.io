<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta name="description" content="Звезды и их окружение как протяженные источники, инфографика">
<title>Звезды и их окружение как протяженные источники</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../../collections.css">
<link rel="stylesheet" href="../style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="../../collections.js"></script>
<script src="script.js"></script>
<script>
function addCollectionTable(data) {
tab = document.getElementById("tab");
Object.entries(data).forEach(([name, params]) => {
  let classes = params["tags"];
  let pth = `../images/${params["imnam"]}`;
  let mass = "";
  if ("mass" in params) {
    mass = `<div class="mass">${params['mass']}</div>\n`;
  }
  let temp = "";
  if ("temp" in params) {
    temp = `<div class="temp">${params['temp']}</div>\n`;
  }
  let jmag = "";
  if ("jmag" in params) {
    jmag = `<div class="jmag">${params['jmag']}</div>\n`;
  }
  let imgdat = "";
  if ("imgdat" in params) {
    imgdat = `<div class="imgdat">${params['imgdat']}</div>\n`;
  }
  let bib = "";
  if ("bib" in params) {
    bib = ` data-b="${params['bib']}"`;
  }
  let desc = "";
  if ("desc" in params) {
    desc = `<div class="desc">${params['desc']}</div>\n`;
  }
  let sp = "";
  if ("sp" in params) {
    sp = params['sp'];
  }
  let datab = "";
  if ("imurl" in params) {
    datab = ` data-b="${params['imurl']}"`;
  }
  tab.innerHTML += `<div class="obj ${classes.join(' ')}"${bib}>
<div class="img"${datab}><img alt="${params['name']}" src="${pth}"></div>
<div class="name"><a href="${params['url']}">${params['runam']}</a></div>
<div class="angular">${params['angular']}</div>
<div class="size">${params['size']}</div>
${mass}<div class="class">${sp}</div>
${temp}<div class="mag">${params['mag']}</div>
${jmag}${desc}${imgdat}</div>`;
})
}
fetch("https://raw.githubusercontent.com/gvard/astrodata/main/data/stars/resolved.json")
  .then(response => response.json())
  .then(data => addCollectionTable(data))
  .catch(err => console.log(err));
</script>
</head>
<body>
<div id="messageBox">
<div id="contents"></div>
</div>
<h1>Звезды не как точки</h1>
<div class="cont">
<b>Пульт управления информацией:</b><br>
<div id="controls">
<label class="nowrap"><input type="checkbox" name=".name" checked onclick="showHideThis(this)">Имя</label>,
<label class="nowrap"><input type="checkbox" name=".angular" value="block" onclick="showHideThis(this)">Угловой диаметр</label>,
<label class="nowrap"><input type="checkbox" name=".size" value="block" checked onclick="showHideThis(this)">Радиус</label>,
<label class="nowrap"><input type="checkbox" name=".mass" value="block" onclick="showHideThis(this)">Масса</label>,
<label class="nowrap"><input type="checkbox" name=".class" value="block" checked onclick="showHideThis(this)">Спектральный класс</label>,
<label class="nowrap"><input type="checkbox" name=".temp" value="block" checked onclick="showHideThis(this)">Эффективная температура</label>,
<label class="nowrap"><input type="checkbox" name=".mag" value="block" onclick="showHideThis(this)">Зв. величина (V)</label>,
<label class="nowrap"><input type="checkbox" name=".jmag" value="block" onclick="showHideThis(this)">Зв. величина (J)</label>
<div id="props">
<button onclick="uncheckAll(true)">Вкл</button><button onclick="uncheckAll(false)">Выкл</button><br>
<label class="nowrap"><input type="checkbox" name=".obj" checked onclick="showHideThis(this)">Все объекты</label>
<br><b>Классы:</b><br>
<label class="nowrap"><input type="checkbox" name=".hypergiant" checked onclick="showHideThis(this)">Гипергиганты</label>
<label class="nowrap"><input type="checkbox" name=".sg" checked onclick="showHideThis(this)">Сверхгиганты</label>
<label class="nowrap"><input type="checkbox" name=".brightgiant" checked onclick="showHideThis(this)">Яркие гиганты</label>
<label class="nowrap"><input type="checkbox" name=".giant" checked onclick="showHideThis(this)">Гиганты</label>
<label class="nowrap"><input type="checkbox" name=".agb" checked onclick="showHideThis(this)">AGB</label>
<label class="nowrap"><input type="checkbox" name=".subgiant" checked onclick="showHideThis(this)">Субгиганты</label>
<label class="nowrap"><input type="checkbox" name=".dwarf" checked onclick="showHideThis(this)">Карлики</label>
<label class="nowrap"><input type="checkbox" name=".wd" checked onclick="showHideThis(this)">Белые карлики</label>
<br><b title="Appearance">Проявление:</b><br>
<label class="nowrap"><input type="checkbox" name=".variable" checked onclick="showHideThis(this)">Переменные</label>
<label class="nowrap"><input type="checkbox" name=".mira" checked onclick="showHideThis(this)">Мириды</label>
<label class="nowrap"><input type="checkbox" name=".cepheid" checked onclick="showHideThis(this)">Цефеиды</label>
<label class="nowrap"><input type="checkbox" name=".dimming" checked onclick="showHideThis(this)">Звезды с примечательными эпизодами падения блеска</label>
<br><b>Окружение:</b><br>
<label class="nowrap"><input type="checkbox" name=".cse" checked onclick="showHideThis(this)">Околозвездная оболочка</label>
<label class="nowrap"><input type="checkbox" name=".bowshock" checked onclick="showHideThis(this)">Астросфера, головная ударная волна</label>
<label class="nowrap"><input type="checkbox" name=".nebula" checked onclick="showHideThis(this)">Туманность</label>
<br><b>Картинка:</b>
<label class="nowrap"><input type="checkbox" name=".animation" value="block" checked onclick="showHideThis(this)">Анимация</label>
<label class="nowrap"><input type="checkbox" name=".low" value="block" checked onclick="showHideThis(this)">Низкое разрешение</label><br>
<b>Сортировать:</b> <button onclick="toSort('size')">по возрастанию размера</button>
<button onclick="toSort('mass')">по возрастанию массы</button>
<!-- <button onclick="toSort('mag')">по возрастанию звездной величины</button> -->
</div>
</div>
Фокус на картинке – полная информация
</div>
<div id="tab">
</div>
</body>
</html>
