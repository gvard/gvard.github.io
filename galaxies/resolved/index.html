<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<meta name="description" content="Коллекции астрономических объектов: галактики Местного объема">
<title>Галактики</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../../collections.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="../../grid-interactions-subdir.js"></script>
<script src="../../collections.js"></script>
<script src="../script.js"></script>
<script>
function addCollectionTable(data) {
tab = document.getElementById("tab");
Object.entries(data).forEach(([name, params]) => {
  let classes = params["tags"];
  let pth = `../images/${params["imnam"]}`;
  let angular = "";
  if ("angular" in params) {
    angular = `<div class="if angular">${params['angular']}</div>\n`;
  }
  let size = "";
  if ("size" in params) {
    size = `<div class="if size">${params['size']}</div>\n`;
  }
  let mass = "";
  if ("mass" in params) {
    mass = `<div class="if mass">${params['mass']}</div>\n`;
  }
  let cl = "";
  if ("class" in params) {
    cl = `<div class="if class">${params['class']}</div>\n`;
  }
  let bib = "";
  if ("bib" in params) {
    bib = ` data-b="${params['bib']}"`;
  }
  let dist = "";
  if ("dist" in params) {
    dist = `<div class="if dist">${params['dist']}</div>\n`;
  }
  let desc = "";
  if ("desc" in params) {
    desc = `<div class="desc">${params['desc']}</div>\n`;
  }
  let datab = "";
  if ("imurl" in params) {
    datab = ` data-b="${params['imurl']}"`;
  }
  tab.innerHTML += `<div class="obj ${classes.join(' ')}">
<div class="img"${datab}><img alt="${params['name']}" src="${pth}"></div>
<div class="name"><a href="${params['url']}">${params['runam']}</a></div>
${angular}${size}${mass}${cl}${dist}${desc}`;
})
}
fetch("https://raw.githubusercontent.com/gvard/astrodata/main/data/galaxies/nearby.json")
  .then(response => response.json())
  .then(data => addCollectionTable(data))
  .catch(err => console.log(err));
</script>
</head>
<body>
<div id="messageBox">
<div id="contents"></div>
</div>
<h1>Галактики, разрешающиеся на отдельные звезды</h1>
<div class="cont">
<b>Пульт управления информацией:</b><br>
<div id="controls">
<label class="nowrap"><input type="checkbox" name=".name" value="block" checked onclick="showHideThis(this)">Название</label>,
<label class="nowrap"><input type="checkbox" name=".angular" value="block" checked onclick="showHideThis(this)">Угловой диаметр</label>,
<label class="nowrap"><input type="checkbox" name=".size" value="block" checked onclick="showHideThis(this)">Размеры</label>,
<label class="nowrap"><input type="checkbox" name=".mass" value="block" checked onclick="showHideThis(this)">Масса</label>,
<label class="nowrap"><input type="checkbox" name=".class" value="block" checked onclick="showHideThis(this)">Тип</label>,
<label class="nowrap"><input type="checkbox" name=".dist" value="block" checked onclick="showHideThis(this)">Расстояние</label>,
<div id="props">
<button onclick="uncheckAll(true)">Вкл</button><button onclick="uncheckAll(false)">Выкл</button><br>
<label class="nowrap"><input type="checkbox" name=".obj" checked onclick="showHideThis(this)">Все объекты</label>
<label class="nowrap"><input type="checkbox" name=".agn" checked onclick="showHideThis(this)">Галактики с активным ядром</label>
<label class="nowrap"><input type="checkbox" name=".sn" checked onclick="showHideThis(this)">Наблюдались вспышки сверхновых</label>
<label class="nowrap"><input type="checkbox" name=".smbh" checked onclick="showHideThis(this)">Наличие сверхмассивных черных дыр</label>
<br><b>Номенклатура:</b><br>
Каталоги <label class="nowrap"><input type="checkbox" name=".M" checked onclick="showHideThis(this)"> Мессье</label>
<label class="nowrap"><input type="checkbox" name=".C" checked onclick="showHideThis(this)">Колдуэлла</label>
<label class="nowrap"><input type="checkbox" name=".NGC" checked onclick="showHideThis(this)">NGC</label>
<label class="nowrap"><input type="checkbox" name=".IC" checked onclick="showHideThis(this)">IC</label>
<label class="nowrap"><input type="checkbox" name=".pgc" checked onclick="showHideThis(this)">PGC</label>
<label class="nowrap"><input type="checkbox" name=".ugc" checked onclick="showHideThis(this)">UGC</label>
<br><b>Космография:</b><br>
<label class="nowrap"><input type="checkbox" name=".MWsat" checked onclick="showHideThis(this)">Спутники Млечного пути</label>
<label class="nowrap"><input type="checkbox" name=".M31sat" checked onclick="showHideThis(this)">Спутники M31</label>
<br><b>Морфология:</b><br>
<label class="nowrap"><input type="checkbox" name=".S" checked onclick="showHideThis(this)">Спиральные галактики</label>
<label class="nowrap"><input type="checkbox" name=".grand-design" checked onclick="showHideThis(this)">Grand design</label>
<label class="nowrap"><input type="checkbox" name=".dwarf" checked onclick="showHideThis(this)">Карлики</label>
<label class="nowrap"><input type="checkbox" name=".irr" checked onclick="showHideThis(this)">Неправильные галактики</label>
<br><b>Сортировать:</b> <button onclick="toSort('size')">по возрастанию размера</button>
<button onclick="toSort('mass')">по возрастанию массы</button>
</div>
</div>
Фокус на картинке – полная информация
</div>
<div id="tab">
</div>
</body>
</html>
